<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>produtos</title>
</head>

<body class="bg-gray-400 flex flex-col items-center justify-center gap-4 h-screen">
    <h1 class="text-2xt"></h1>Lista de produtos</h1>
    <!--border rounded é para arredondar as bordas-->
    <!--px-8 é o padding do conteiner em largura-->
    <!--py-7 é o padding do conteiner em altura-->
    <input type="text" class="border rounded px-8 py-2" id="produto">
    <input type="text" class="border rounded px-8 py-2" id="codigo">
    <input type="text" class="border rounded px-8 py-2" id="quantia">

    <button class="bg-blue-500 text-white px-4 py-2 rounded" 
        onclick="adicionarProduto()">
        adicionar
    </button>

    <!--tabela para exibir o que foi digitado nos campos acima-->
    <div class="w-full max-w-2xl mt-4 overflow-hidden rounded-xl shadow-lg">
        <table id="lista" class="w-full table-fixed border-collapse bg-white">
            <thead class="bg-gray-800 text-white">
                <tr>
                    <th class="w-1/3 px-4 py-3 text-left">Produto</th>
                    <th class="w-1/3 px-4 py-3 text-left">Código</th>
                    <th class="w-1/3 px-4 py-3 text-left">Quantia</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela" class="divide-y divide-gray-200">
                <!-- Os resultados do JS entram aqui -->
            </tbody>
        </table>
    </div>
    
    
</body>

</html>
